<script>
(function mountJewelCaseModal() {
  const modal = document.getElementById('jewel-modal');
  const triggers = document.querySelectorAll('.sonus-jewel-open');
  const modalTitle = document.getElementById('jewel-modal-title');
  const modalBooklet = document.getElementById('sonus-modal-booklet');
  const audioEl = /** @type {HTMLAudioElement | null} */ (document.getElementById('sonus-modal-audio'));
  const openSvg = modal?.querySelector('.sonus-open-case-svg');
  if (!modal || !triggers.length) return;

  const focusTarget = modal.querySelector('.modal-close');
  let activeTrigger = null;

  function resetDiscSpinVisual() {
    if (!openSvg) return;
    const disc = openSvg.querySelector('#sonus-modal-disc');
    openSvg.classList.remove('is-disc-playing');
    if (!disc || !(disc instanceof SVGElement)) return;
    disc.style.setProperty('animation', 'none');
    void modal.offsetHeight;
    disc.style.removeProperty('animation');
  }

  function syncDiscCoverFromModal() {
    const svg = modal.querySelector('.sonus-open-case-svg');
    const img = /** @type {SVGImageElement | null} */ (svg?.querySelector('#sonus-modal-disc-cover') ?? null);
    if (!img) return;
    const cover = ((modal.dataset.jewelCover || '') + '').trim();
    if (!cover) {
      img.removeAttribute('href');
      img.setAttribute('opacity', '0');
      return;
    }
    try {
      img.setAttribute('href', new URL(cover, window.location.href).href);
      img.setAttribute('opacity', '0.94');
    } catch (_) {
      img.removeAttribute('href');
      img.setAttribute('opacity', '0');
    }
  }

  function syncModalFromButton(btn) {
    const project = (btn.dataset.jewelProject || '').trim();
    const cover = (btn.dataset.jewelCover || '').trim();
    modal.dataset.jewelCover = cover;
    if (modalTitle) modalTitle.textContent = project || 'Sonus';
    if (modalBooklet) {
      modalBooklet.style.display = (btn.dataset.jewelBooklet || '').trim() === 'genesis' ? 'block' : 'none';
    }
    syncDiscCoverFromModal();
    syncDiscRingTitle();
  }

  function syncDiscRingTitle() {
    const tp = document.getElementById('sonus-disc-title-tp');
    if (!tp || !modalTitle) return;
    const t = (modalTitle.textContent || '').trim();
    tp.textContent = t.length ? t : ' ';
  }

  function prepareModalAudio(btn) {
    if (!audioEl) return;
    audioEl.pause();
    try {
      audioEl.currentTime = 0;
    } catch (_) {
      /* ignore */
    }
    const src = ((btn && btn.dataset.jewelAudio) || '').trim();
    if (!src) {
      audioEl.removeAttribute('src');
      audioEl.load();
      return;
    }
    let absWant;
    try {
      absWant = new URL(src, window.location.href).href;
    } catch (_) {
      audioEl.removeAttribute('src');
      audioEl.load();
      return;
    }
    if (audioEl.src !== absWant) {
      audioEl.src = src;
      audioEl.load();
    }
  }

  function openModal(btn) {
    activeTrigger = btn;
    syncModalFromButton(btn);
    prepareModalAudio(btn);
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
    triggers.forEach((b) => b.setAttribute('aria-expanded', 'false'));
    btn.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
    if (focusTarget) focusTarget.focus();
    resetDiscSpinVisual();
  }

  function closeModal() {
    if (audioEl) {
      audioEl.pause();
      try {
        audioEl.currentTime = 0;
      } catch (_) {
        /* ignore */
      }
    }
    resetDiscSpinVisual();
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden', 'true');
    triggers.forEach((b) => b.setAttribute('aria-expanded', 'false'));
    document.body.style.overflow = '';
    if (activeTrigger) activeTrigger.focus();
  }

  triggers.forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      openModal(btn);
    });
  });

  modal.querySelectorAll('[data-jewel-close]').forEach((btn) => {
    btn.addEventListener('click', () => closeModal());
  });

  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  window.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (modal.getAttribute('aria-hidden') === 'false') closeModal();
  });

  if (audioEl && openSvg) {
    audioEl.addEventListener('play', () => openSvg.classList.add('is-disc-playing'));
    audioEl.addEventListener('pause', () => openSvg.classList.remove('is-disc-playing'));
    audioEl.addEventListener('ended', () => openSvg.classList.remove('is-disc-playing'));
  }
})();
</script>
