<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metanoia</title>
<style>
:root[data-theme="dark"]{--bg:#0c0b0a;--text:#dedad4;--dim:#1a1917;--toggle-bg:#2a2826;--toggle-knob:#dedad4;}
:root[data-theme="light"]{--bg:#f5f4f0;--text:#111110;--dim:#e0ddd7;--toggle-bg:#dedad4;--toggle-knob:#111110;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .6s,color .6s;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 48px;}
header{padding:36px 0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;border-bottom:1px solid var(--dim);}
.logo{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--text);opacity:.5;}
nav{display:flex;gap:40px;}
nav a{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--text);opacity:.3;text-decoration:none;transition:opacity .2s;}
nav a:hover{opacity:.8;}
.header-right{display:flex;justify-content:flex-end;}
.toggle{display:flex;align-items:center;gap:10px;cursor:pointer;}
.toggle-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text);opacity:.25;user-select:none;}
.toggle-track{width:36px;height:18px;background:var(--toggle-bg);border-radius:9px;position:relative;border:1px solid var(--dim);}
.toggle-knob{width:12px;height:12px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .3s;}
[data-theme="light"] .toggle-knob{transform:translateX(18px);}
.center{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none;}
.word{font-size:clamp(32px,5vw,56px);font-weight:300;letter-spacing:.02em;color:var(--text);opacity:.7;}
@media(max-width:640px){.page{padding:0 24px;}nav{display:none;}header{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="bg"></div>
<div class="page">
  <header>
    <span class="logo">Metanoia</span>
    <nav>
      <a href="iacta.html">Iacta</a>
      <a href="sonus.html">Sonus</a>
      <a href="anima.html">Anima</a>
    </nav>
    <div class="header-right">
      <div class="toggle" onclick="toggleTheme()">
        <span class="toggle-label" id="theme-label">Dark</span>
        <div class="toggle-track"><div class="toggle-knob"></div></div>
      </div>
    </div>
  </header>
</div>
<div class="center">
  <span class="word">Μετάνοια</span>
</div>
