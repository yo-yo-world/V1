<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metanoia</title>
<style>
:root[data-theme="dark"] {
  --bg: #0c0b0a;
  --text: #dedad4;
  --muted: #3a3835;
  --dim: #1a1917;
  --toggle-bg: #2a2826;
  --toggle-knob: #dedad4;
}

:root[data-theme="light"] {
  --bg: #f5f4f0;
  --text: #111110;
  --muted: #c0bdb8;
  --dim: #e0ddd7;
  --toggle-bg: #dedad4;
  --toggle-knob: #111110;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background 0.6s ease, color 0.6s ease;
}

#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 48px;
}

header {
  padding: 36px 0;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  border-bottom: 1px solid var(--dim);
  transition: border-color 0.6s ease;
}

.logo {
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--text);
  opacity: 0.5;
  transition: color 0.6s ease;
}

nav {
  display: flex;
  gap: 40px;
  align-items: center;
}

nav a {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text);
  opacity: 0.3;
  text-decoration: none;
  transition: opacity 0.2s, color 0.6s ease;
}

nav a:hover { opacity: 0.8; }

.header-right {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

/* Toggle */
.toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.toggle-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text);
  opacity: 0.25;
  transition: color 0.6s ease;
  user-select: none;
}

.toggle-track {
  width: 36px;
  height: 18px;
  background: var(--toggle-bg);
  border-radius: 9px;
  position: relative;
  transition: background 0.3s ease;
  border: 1px solid var(--dim);
}

.toggle-knob {
  width: 12px;
  height: 12px;
  background: var(--toggle-knob);
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: transform 0.3s ease, background 0.6s ease;
}

[data-theme="light"] .toggle-knob {
  transform: translateX(18px);
}

/* Hero */
.hero {
  padding: 140px 0 120px;
}

.hero-label {
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--text);
  opacity: 0.2;
  margin-bottom: 40px;
  display: block;
  transition: color 0.6s ease;
}

.hero-title {
  font-size: clamp(64px, 8vw, 112px);
  font-weight: 200;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--text);
  transition: color 0.6s ease;
}

.hero-title em {
  font-style: italic;
  opacity: 0.25;
}

.hero-sub {
  margin-top: 48px;
  font-size: 13px;
  font-weight: 300;
  line-height: 2;
  color: var(--text);
  opacity: 0.35;
  max-width: 380px;
  transition: color 0.6s ease;
}

/* Footer */
footer {
  border-top: 1px solid var(--dim);
  padding: 32px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: border-color 0.6s ease;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  background: var(--bg);
  transition: background 0.6s ease, border-color 0.6s ease;
  padding-left: calc((100vw - 960px) / 2 + 48px);
  padding-right: calc((100vw - 960px) / 2 + 48px);
}

.footer-left {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text);
  opacity: 0.15;
  transition: color 0.6s ease;
}

.footer-right {
  font-size: 11px;
  font-style: italic;
  font-weight: 300;
  color: var(--text);
  opacity: 0.15;
  transition: color 0.6s ease;
}

@media (max-width: 640px) {
  .page { padding: 0 24px; }
  header { grid-template-columns: 1fr 1fr; gap: 16px; }
  nav { display: none; }
  footer {
    padding-left: 24px;
    padding-right: 24px;
  }
}
</style>
</head>
<body>

<div id="bg"></div>

<div class="page">
  <header>
    <span class="logo">Metanoia</span>

    <nav>
      <a href="iacta.html">Iacta</a>
      <a href="sonus.html">Sonus</a>
      <a href="anima.html">Anima</a>
    </nav>

    <div class="header-right">
      <div class="toggle" onclick="toggleTheme()">
        <span class="toggle-label" id="theme-label">Dark</span>
        <div class="toggle-track">
          <div class="toggle-knob"></div>
        </div>
      </div>
    </div>
  </header>

  <div class="hero">
    <span class="hero-label">Μετάνοια</span>
    <h1 class="hero-title">
      Meta<br>
      <em>noia.</em>
    </h1>
    <p class="hero-sub">
      Beyond the usual way of thinking.<br>
      The mind that has become other.
    </p>
  </div>
</div>

<footer>
  <span class="footer-left">metanoia.fyi</span>
  <span class="footer-right">"I fall. I return. We understand."</span>
</footer>

<script>
const bg = document.getElementById('bg');
let t = 0;
let animFrame;

function animateDark() {
  t += 0.0002;
  const x1 = 20 + Math.sin(t) * 15;
  const y1 = 50 + Math.cos(t * 0.7) * 20;
  const x2 = 80 + Math.cos(t * 0.8) * 12;
  const y2 = 20 + Math.sin(t * 0.9) * 18;
  const x3 = 60 + Math.sin(t * 1.1) * 10;
  const y3 = 80 + Math.cos(t * 0.6) * 15;
  bg.style.backgroundImage = `
    radial-gradient(ellipse at ${x1}% ${y1}%, #1c1410 0%, transparent 55%),
    radial-gradient(ellipse at ${x2}% ${y2}%, #0e1410 0%, transparent 55%),
    radial-gradient(ellipse at ${x3}% ${y3}%, #14090f 0%, transparent 55%)
  `;
  animFrame = requestAnimationFrame(animateDark);
}

function animateLight() {
  t += 0.0002;
  const x1 = 20 + Math.sin(t) * 15;
  const y1 = 50 + Math.cos(t * 0.7) * 20;
  const x2 = 80 + Math.cos(t * 0.8) * 12;
  const y2 = 20 + Math.sin(t * 0.9) * 18;
  const x3 = 60 + Math.sin(t * 1.1) * 10;
  const y3 = 80 + Math.cos(t * 0.6) * 15;
  bg.style.backgroundImage = `
    radial-gradient(ellipse at ${x1}% ${y1}%, #ede8e0 0%, transparent 55%),
    radial-gradient(ellipse at ${x2}% ${y2}%, #e8ede0 0%, transparent 55%),
    radial-gradient(ellipse at ${x3}% ${y3}%, #ede0e8 0%, transparent 55%)
  `;
  animFrame = requestAnimationFrame(animateLight);
}

function toggleTheme() {
  const html = document.documentElement;
  const label = document.getElementById('theme-label');
  cancelAnimationFrame(animFrame);
  if (html.dataset.theme === 'dark') {
    html.dataset.theme = 'light';
    label.textContent = 'Light';
    animateLight();
  } else {
    html.dataset.theme = 'dark';
    label.textContent = 'Dark';
    animateDark();
  }
}

animateDark();
</script>
</body>
</html>
