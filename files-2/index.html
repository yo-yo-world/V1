<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metanoia</title>
<style>
:root[data-theme="dark"]{--bg:#0c0b0a;--text:#dedad4;--dim:#1a1917;--toggle-bg:#2a2826;--toggle-knob:#dedad4;}
:root[data-theme="light"]{--bg:#f5f4f0;--text:#111110;--dim:#e0ddd7;--toggle-bg:#dedad4;--toggle-knob:#111110;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .6s,color .6s;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 48px;}
header{padding:36px 0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;border-bottom:1px solid var(--dim);}
.logo{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--text);opacity:.5;text-decoration:none;}
nav{display:flex;gap:40px;}
nav a{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--text);opacity:.3;text-decoration:none;transition:opacity .2s;}
nav a:hover{opacity:.8;}
.header-right{display:flex;justify-content:flex-end;}
.toggle{display:flex;align-items:center;gap:10px;cursor:pointer;}
.toggle-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text);opacity:.25;user-select:none;}
.toggle-track{width:36px;height:18px;background:var(--toggle-bg);border-radius:9px;position:relative;border:1px solid var(--dim);}
.toggle-knob{width:12px;height:12px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .3s;}
[data-theme="light"] .toggle-knob{transform:translateX(18px);}
.hero{padding:140px 0 120px;}
.hero-label{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--text);opacity:.2;margin-bottom:40px;display:block;}
.hero-title{font-size:clamp(64px,8vw,112px);font-weight:200;line-height:1;letter-spacing:-.03em;color:var(--text);}
.hero-title em{font-style:italic;opacity:.25;}
.hero-sub{margin-top:48px;font-size:13px;font-weight:300;line-height:2;color:var(--text);opacity:.35;max-width:380px;}
footer{border-top:1px solid var(--dim);padding:32px 0;display:flex;justify-content:space-between;position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--bg);transition:background .6s;padding-left:calc((100vw - 960px)/2 + 48px);padding-right:calc((100vw - 960px)/2 + 48px);}
.footer-left{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--text);opacity:.15;}
.footer-right{font-size:11px;font-style:italic;color:var(--text);opacity:.15;}
@media(max-width:640px){.page{padding:0 24px;}header{grid-template-columns:1fr 1fr;}nav{display:none;}footer{padding-left:24px;padding-right:24px;}}
</style>
</head>
<body>
<div id="bg"></div>
<div class="page">
  <header>
    <span class="logo">Metanoia</span>
    <nav>
      <a href="iacta.html">Iacta</a>
      <a href="sonus.html">Sonus</a>
      <a href="anima.html">Anima</a>
    </nav>
    <div class="header-right">
      <div class="toggle" onclick="toggleTheme()">
        <span class="toggle-label" id="theme-label">Dark</span>
        <div class="toggle-track"><div class="toggle-knob"></div></div>
      </div>
    </div>
  </header>
  <div class="hero">
    <span class="hero-label">Μετάνοια</span>
    <h1 class="hero-title">Meta<br><em>noia.</em></h1>
    <p class="hero-sub">Beyond the usual way of thinking.<br>The mind that has become other.</p>
  </div>
</div>
<footer>
  <span class="footer-left">metanoia.fyi</span>
  <span class="footer-right">"I fall. I return. We understand."</span>
</footer>
<script src="shared.js"></script>
</body>
</html>
