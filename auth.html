<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Μετάνοια</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
<div id="bg"></div>

<div class="toggle" onclick="toggleTheme()">
  <span class="toggle-label" id="theme-label">Dark</span>
  <div class="toggle-track"><div class="toggle-knob"></div></div>
</div>

<div class="box">
  <span class="title">Μετάνοια</span>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login', event)">Enter</div>
    <div class="tab" onclick="switchTab('signup', event)">Join</div>
  </div>

  <div id="login-form">
    <div class="field"><input type="email" id="login-email" placeholder="email"></div>
    <div class="field"><input type="password" id="login-pass" placeholder="password"></div>
    <button class="submit" onclick="login()">Enter →</button>
  </div>

  <div id="signup-form" style="display:none">
    <div class="field"><input type="email" id="signup-email" placeholder="email"></div>
    <div class="field"><input type="password" id="signup-pass" placeholder="password"></div>
    <button class="submit" onclick="signup()">Join →</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
const sb = getSupabase();

// Check if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'index.html';
});

function switchTab(tab, event) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (event && event.target) {
    event.target.classList.add('active');
  } else {
    const target = tab === 'login' ? document.querySelector('.tabs .tab:first-child') : document.querySelector('.tabs .tab:last-child');
    if (target) target.classList.add('active');
  }
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('msg').textContent = '';
}

async function login() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const msg = document.getElementById('msg');
  msg.textContent = '—';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { msg.textContent = error.message; return; }
  window.location.href = 'index.html';
}

async function signup() {
  const email = document.getElementById('signup-email').value;
  const pass = document.getElementById('signup-pass').value;
  const msg = document.getElementById('msg');
  msg.textContent = '—';
  const { error } = await sb.auth.signUp({ email, password: pass });
  if (error) { msg.textContent = error.message; return; }
  msg.textContent = 'Check your email to confirm.';
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const isLogin = document.getElementById('login-form').style.display !== 'none';
  isLogin ? login() : signup();
});
</script>
</body>
</html>
