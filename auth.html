<!DOCTYPE html>
<html lang="en" data-theme="dark" data-i18n-doc-title="page.auth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Μετάνοια</title>
<link rel="stylesheet" href="styles.css?v=20260511-2">
<script src="i18n.js"></script>
</head>
<body class="auth-page">
<div id="bg"></div>


<div class="box">
  <span class="title" data-i18n="brand.name">Μετάνοια</span>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login', event)" data-i18n="auth.tab.enter">Enter</div>
    <div class="tab" onclick="switchTab('signup', event)" data-i18n="auth.tab.join">Join</div>
  </div>

  <div id="login-form">
    <div class="field"><input type="email" id="login-email" data-i18n-placeholder="auth.placeholder.email" placeholder="email"></div>
    <div class="field"><input type="password" id="login-pass" data-i18n-placeholder="auth.placeholder.password" placeholder="password"></div>
    <button type="button" class="submit" onclick="login()" data-i18n="auth.submit.enter">Enter →</button>
  </div>

  <div id="signup-form" style="display:none">
    <div class="field"><input type="email" id="signup-email" data-i18n-placeholder="auth.placeholder.email" placeholder="email"></div>
    <div class="field"><input type="password" id="signup-pass" data-i18n-placeholder="auth.placeholder.password" placeholder="password"></div>
    <button type="button" class="submit" onclick="signup()" data-i18n="auth.submit.join">Join →</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
const sb = getSupabase();

// Check if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'index.html';
});

function switchTab(tab, event) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (event && event.target) {
    event.target.classList.add('active');
  } else {
    const target = tab === 'login' ? document.querySelector('.tabs .tab:first-child') : document.querySelector('.tabs .tab:last-child');
    if (target) target.classList.add('active');
  }
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('msg').textContent = '';
}

async function login() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const msg = document.getElementById('msg');
  msg.textContent = '—';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { msg.textContent = error.message; return; }
  window.location.href = 'index.html';
}

async function signup() {
  const email = document.getElementById('signup-email').value;
  const pass = document.getElementById('signup-pass').value;
  const msg = document.getElementById('msg');
  msg.textContent = '—';
  const { error } = await sb.auth.signUp({ email, password: pass });
  if (error) { msg.textContent = error.message; return; }
  msg.textContent = (window.MetanoiaI18n && window.MetanoiaI18n.t('auth.msg.confirm')) || 'Check your email to confirm.';
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const isLogin = document.getElementById('login-form').style.display !== 'none';
  isLogin ? login() : signup();
});
</script>
</body>
</html>
